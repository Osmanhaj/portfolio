<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Osman Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f6f9;
color:#333;
}

header{
background:#111;
color:white;
text-align:center;
padding:60px 20px;
}

header h1{
font-size:40px;
margin-bottom:10px;
}

header p{
font-size:18px;
color:#bbb;
}

section{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

h2{
text-align:center;
margin-bottom:30px;
}

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.project{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.project:hover{
transform:translateY(-5px);
}

.project h3{
margin-bottom:10px;
}

footer{
text-align:center;
padding:20px;
background:#111;
color:white;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>Osman Haj</h1>
<p>Front-End Developer | HTML CSS JavaScript</p>
</header>

<section>

<h2>My Projects</h2>

<div class="projects">

<div class="project">
<h3>Landing Page</h3>
<p>Responsive landing page built using HTML and CSS.</p>
</div>

<div class="project">
<h3>Store Website</h3>
<p>Basic e-commerce layout with product cards.</p>
</div>

<div class="project">
<h3>Dashboard</h3>
<p>Simple dashboard interface with statistics.</p>
</div>

</div>

</section>

<footer>

<p>© 2026 Osman Haj</p>

</footer>

</body>
</html>
