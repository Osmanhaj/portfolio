<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simple Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
max-width:1000px;
margin:auto;
}

.product{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.product img{
width:100%;
border-radius:10px;
}

button{
margin-top:10px;
padding:10px 15px;
background:#111;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#333;
}

</style>

</head>

<body>

<header>

<h1>Online Store</h1>

</header>

<section class="products">

<div class="product">

<img src="https://picsum.photos/300/200">

<h3>Product One</h3>

<p>$29</p>

<button>Add to Cart</button>

</div>

<div class="product">

<img src="https://picsum.photos/301/200">

<h3>Product Two</h3>

<p>$39</p>

<button>Add to Cart</button>

</div>

<div class="product">

<img src="https://picsum.photos/302/200">

<h3>Product Three</h3>

<p>$49</p>

<button>Add to Cart</button>

</div>

</section>

</body>

</html>
